name: Build BetterTeams

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 1.20.6-patched

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B --no-transfer-progress -DskipTests

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Meow-${{ github.run_number }}
          name: Meow ${{ github.run_number }}
          files: target/*.jar
          generate_release_notes: true
